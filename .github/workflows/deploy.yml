name: Production EKS Deploy

on:
  push:
    branches: [ "main" ]

# This section is CRITICAL for OIDC to work
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/k8s-helm-deploy:latest

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use the Role ARN you created in the previous step
          role-to-assume: arn:aws:iam::666127452756:role/GitHubEKSDeployRole
          aws-region: eu-west-2

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.AWS_CLUSTER_NAME }} --region eu-west-2
      - name: Deploy with Helm
        run: |
            helm upgrade --install spring-release ./charts/spring-app \
              --set image.tag=latest \
              --wait