apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-app-ingress
  annotations:
    # This tells Kubernetes: "Use the Nginx controller I already have"
    kubernetes.io/ingress.class: "nginx"
    # Optional: Increases the upload size if your app handles files
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.ipenitc.com  # <--- YOUR CLEAN URL
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-release-service # This MUST match your service name
                port:
                  number: 80